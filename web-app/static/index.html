<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Capsule - Transform Voice to Knowledge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 14px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-container {
            display: none;
            margin-top: 20px;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .status-message {
            color: #666;
            text-align: center;
            font-size: 14px;
        }
        
        .result-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        
        .result-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .result-text {
            color: #666;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Voice Capsule</h1>
        <p class="subtitle">Transform your voice recordings into organized knowledge</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop audio file here or click to browse</div>
            <div class="upload-hint">Supports WAV, MP3, M4A, OGG (max 100MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept=".wav,.mp3,.m4a,.ogg">
        
        <button class="btn" id="uploadBtn" disabled>Upload & Process</button>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="status-message" id="statusMessage">Processing...</div>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div class="result-title">✅ Transcription Complete</div>
            <div class="result-text" id="resultText"></div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">Words</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="notePath">-</div>
                    <div class="stat-label">Saved to Obsidian</div>
                </div>
            </div>
        </div>
        
        <div class="error" id="errorMessage"></div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');
        const resultContainer = document.getElementById('resultContainer');
        const resultText = document.getElementById('resultText');
        const wordCount = document.getElementById('wordCount');
        const notePath = document.getElementById('notePath');
        const errorMessage = document.getElementById('errorMessage');
        
        let selectedFile = null;
        
        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                uploadArea.querySelector('.upload-text').textContent = selectedFile.name;
                uploadBtn.disabled = false;
            }
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            selectedFile = e.dataTransfer.files[0];
            if (selectedFile) {
                uploadArea.querySelector('.upload-text').textContent = selectedFile.name;
                uploadBtn.disabled = false;
            }
        });
        
        // Upload button
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            errorMessage.style.display = 'none';
            
            try {
                // Upload file
                const formData = new FormData();
                formData.append('file', selectedFile);
                
                const uploadResponse = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!uploadResponse.ok) {
                    throw new Error('Upload failed');
                }
                
                const { job_id } = await uploadResponse.json();
                
                // Poll for status
                await pollStatus(job_id);
                
            } catch (error) {
                showError(error.message);
                uploadBtn.disabled = false;
            }
        });
        
        async function pollStatus(jobId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${jobId}`);
                    const data = await response.json();
                    
                    // Update progress
                    progressFill.style.width = data.progress + '%';
                    progressFill.textContent = data.progress + '%';
                    statusMessage.textContent = data.message;
                    
                    if (data.status === 'completed') {
                        clearInterval(interval);
                        showResult(data.result);
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        showError(data.message);
                    }
                } catch (error) {
                    clearInterval(interval);
                    showError('Failed to check status');
                }
            }, 1000);
        }
        
        function showResult(result) {
            progressContainer.style.display = 'none';
            resultContainer.style.display = 'block';
            
            resultText.textContent = result.transcription;
            wordCount.textContent = result.word_count;
            notePath.textContent = '✓';
            
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Process Another File';
        }
        
        function showError(message) {
            errorMessage.textContent = '❌ Error: ' + message;
            errorMessage.style.display = 'block';
            progressContainer.style.display = 'none';
            uploadBtn.disabled = false;
        }
    </script>
</body>
</html>
